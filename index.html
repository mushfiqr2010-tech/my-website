<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pro Website</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
}

nav a {
    color: #00f5ff;
    text-decoration: none;
    margin: 0 15px;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    color: #00f5ff;
    text-shadow: 0 0 20px #00f5ff;
}

.hero p {
    font-size: 20px;
    opacity: 0.8;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00f5ff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.btn:hover {
    background: white;
}

/* SECTIONS */
section {
    padding: 80px 20px;
    text-align: center;
}

.card {
    display: inline-block;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin: 10px;
    width: 220px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
    background: rgba(0,245,255,0.1);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.4);
    margin-top: 50px;
}
</style>
</head>

<body>

<nav>
    <div><b>MY PORTFOLIO</b></div>
    <div>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero" id="home">
    <h1>Hi, I'm Developer 😎</h1>
    <p>I build websites, apps & games</p>
    <button class="btn">Hire Me</button>
</div>

<section id="projects">
    <h2>My Projects</h2>

    <div class="card">GTA Game (Python)</div>
    <div class="card">AI Assistant</div>
    <div class="card">Chat App</div>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>I am learning Web Development, AI & Game Dev.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: yourmail@gmail.com</p>
</section>

<footer>
    © 2026 My Portfolio | Built with passion 🚀
</footer>

</body>
</html>
