# Google-Style Modern Search Website (Single File)

ফাইলের নাম দাও: `index.html`

তারপর পুরো code copy করে paste করো:

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Search</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:flex-end;
    padding:20px 40px;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    opacity:0.8;
    transition:0.3s;
}

nav a:hover{
    opacity:1;
    color:#38bdf8;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.logo{
    font-size:90px;
    font-weight:bold;
    margin-bottom:30px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

/* SEARCH BOX */

.search-box{
    width:100%;
    max-width:700px;
    position:relative;
}

.search-box input{
    width:100%;
    padding:18px 25px;
    border:none;
    border-radius:50px;
    background:#1e293b;
    color:white;
    font-size:18px;
    outline:none;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    transition:0.3s;
}

.search-box input:focus{
    box-shadow:0 0 25px #38bdf8;
}

/* BUTTONS */

.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

button:hover{
    background:#38bdf8;
    color:black;
    transform:translateY(-2px);
}

/* RESULT */

.result{
    margin-top:40px;
    width:100%;
    max-width:700px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card a{
    color:#38bdf8;
    text-decoration:none;
    font-size:22px;
}

.card p{
    margin-top:10px;
    opacity:0.8;
    line-height:1.5;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    background:#020617;
    opacity:0.7;
}

@media(max-width:700px){

    .logo{
        font-size:55px;
    }

    .search-box input{
        font-size:16px;
    }

}

</style>
</head>
<body>

<!-- NAVBAR -->

<nav>
    <a href="#">Images</a>
    <a href="#">Apps</a>
    <a href="#">Profile</a>
</nav>

<!-- MAIN -->

<div class="main">

    <div class="logo">
        <span>N</span>
        <span>o</span>
        <span>v</span>
        <span>a</span>
        <span>S</span>
        <span>earch</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput"
        placeholder="Search the web...">
    </div>

    <div class="buttons">

        <button onclick="searchWeb()">
            Nova Search
        </button>

        <button onclick="feelingLucky()">
            I'm Feeling Lucky 😎
        </button>

    </div>

    <!-- RESULT -->

    <div class="result" id="result"></div>

</div>

<!-- FOOTER -->

<footer>
    © 2026 Nova Search | Futuristic Search Experience 🚀
</footer>

<script>

function searchWeb(){

    let query =
    document.getElementById("searchInput").value;

    let result =
    document.getElementById("result");

    if(query.trim() === ""){

        result.innerHTML = `
        <div class="card">
            <p>Please type something to search.</p>
        </div>`;

        return;
    }

    result.innerHTML = `

    <div class="card">
        <a href="https://www.google.com/search?q=${query}" target="_blank">
            Search "${query}" on Google
        </a>

        <p>
            Click here to open real Google search results.
        </p>
    </div>

    <div class="card">
        <a href="https://en.wikipedia.org/wiki/${query}" target="_blank">
            Explore ${query} on Wikipedia
        </a>

        <p>
            Learn more about ${query} from Wikipedia.
        </p>
    </div>

    <div class="card">
        <a href="https://www.youtube.com/results?search_query=${query}" target="_blank">
            Watch ${query} videos on YouTube
        </a>

        <p>
            Discover videos and tutorials about ${query}.
        </p>
    </div>

    `;

}

function feelingLucky(){

    window.open(
    "https://www.google.com",
    "_blank"
    );

}

</script>

</body>
</html>
```
